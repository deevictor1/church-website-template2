<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/site.css">
</head>
<body data-page="contact">
    <div id="site-header"></div>

    <header class="page-header">
        <p class="page-breadcrumb"><a href="index.html">Home</a> / Contact</p>
        <h1>Contact Us</h1>
        <p>We would love to hear from you. Reach out anytime.</p>
    </header>

    <section id="contact" class="alt-bg">
        <div class="section-inner">
            <div class="contact-grid">
                <div class="fade-in-left">
                    <div class="contact-info-items">
                        <div class="contact-info-item">
                            <div class="contact-info-icon"><i class="fa-solid fa-location-dot"></i></div>
                            <div class="contact-info-text">
                                <h4>Address</h4>
                                <p id="cfg-contact-addr">123 Main Street<br>Your City, State 00000</p>
                            </div>
                        </div>
                        <div class="contact-info-item">
                            <div class="contact-info-icon"><i class="fa-regular fa-clock"></i></div>
                            <div class="contact-info-text">
                                <h4>Service Times</h4>
                                <p id="cfg-contact-times">Sunday: 10:30 AM<br>Wednesday: 7:00 PM</p>
                            </div>
                        </div>
                        <div class="contact-info-item">
                            <div class="contact-info-icon"><i class="fa-solid fa-envelope"></i></div>
                            <div class="contact-info-text">
                                <h4>Email Us</h4>
                                <a id="cfg-email" href="mailto:info@youremail.com">info@youremail.com</a>
                            </div>
                        </div>
                        <div class="contact-info-item">
                            <div class="contact-info-icon"><i class="fa-solid fa-phone"></i></div>
                            <div class="contact-info-text">
                                <h4>Phone</h4>
                                <a id="cfg-phone" href="tel:+10000000000">(000) 000-0000</a>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top:32px;">
                        <h4 style="font-weight:600;margin-bottom:14px;font-size:0.9rem;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-light);">Follow Us</h4>
                        <div style="display:flex;gap:12px;">
                            <a id="cfg-contact-fb" href="https://facebook.com" target="_blank" rel="noopener noreferrer" style="width:42px;height:42px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1rem;transition:var(--transition);"><i class="fa-brands fa-facebook-f"></i></a>
                            <a id="cfg-contact-ig" href="https://instagram.com" target="_blank" rel="noopener noreferrer" style="width:42px;height:42px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1rem;transition:var(--transition);"><i class="fa-brands fa-instagram"></i></a>
                            <a id="cfg-contact-yt" href="https://youtube.com" target="_blank" rel="noopener noreferrer" style="width:42px;height:42px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1rem;transition:var(--transition);"><i class="fa-brands fa-youtube"></i></a>
                        </div>
                    </div>
                </div>
                <div class="contact-form fade-in-right">
                    <h3>Send a Message</h3>
                    <div class="form-row">
                        <div class="form-group"><label for="first-name">First Name</label><input id="first-name" type="text" placeholder="John"></div>
                        <div class="form-group"><label for="last-name">Last Name</label><input id="last-name" type="text" placeholder="Smith"></div>
                    </div>
                    <div class="form-group"><label for="email">Email</label><input id="email" type="email" placeholder="john@example.com"></div>
                    <div class="form-group"><label for="subject">Subject</label>
                        <select id="subject">
                            <option>General Inquiry</option>
                            <option>Prayer Request</option>
                            <option>Plan a Visit</option>
                            <option>Ministries</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="form-group"><label for="message">Message</label><textarea id="message" placeholder="How can we help?"></textarea></div>
                    <button type="button" class="btn btn-sage" style="width:100%;justify-content:center;" onclick="alert('Thank you! We will be in touch soon.')"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
                </div>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="js/layout.js"></script>
    <script src="js/site.js"></script>
</body>
</html>
